spring:
  application:
    name: sample-app
  datasource:
    url: jdbc:h2:mem:devtrace;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

server:
  port: 8080

devtrace:
  backend-url: ${DEVTRACE_BACKEND_URL:http://127.0.0.1:9000}
  otlp-endpoint: ${DEVTRACE_OTLP_ENDPOINT:}
  sample-port: ${server.port}
